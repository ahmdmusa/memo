name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🛠️ Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      - name: 🔑 Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: 🔨 Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m"

      - name: 📋 Get Version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date +'%Y.%m.%d')
          echo "version=v${VERSION}-${DATE}" >> $GITHUB_OUTPUT
          echo "apk_name=memo-${VERSION}.apk" >> $GITHUB_OUTPUT

      - name: 🔖 Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk ${{ steps.version.outputs.apk_name }}

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "memo ${{ steps.version.outputs.version }}"
          body: |
            ## 📱 memo — Private Journaling App

            A private, offline-first journaling app. No accounts. No cloud. No tracking.

            ### What's included
            - ✍️ Text, photo, video & voice posts
            - 🌑 Deep Black theme (X-style)
            - 🔒 Biometric lock with configurable timeout
            - 🛡️ AES-256 encrypted `.garden` vault backup
            - 👤 X-style profile with media grid
            - 🔍 Local search

            ### Installation
            1. Download `memo-*.apk` below
            2. Transfer to your Android device
            3. Enable **"Install from unknown sources"**
            4. Install & enjoy your private garden 🌿

            ---
            *Built automatically via GitHub Actions*
          files: ${{ steps.version.outputs.apk_name }}
          make_latest: true
